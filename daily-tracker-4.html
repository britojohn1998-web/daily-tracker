function todayKey(){return new Date().toISOString().split("T")[0];}

function useStorage(key,init){
  const full=`dtapp_${key}`;
  const[val,setVal]=useState(()=>{try{const v=localStorage.getItem(full);return v!=null?JSON.parse(v):init;}catch{return init;}});
  const save=(v)=>{setVal(v);try{localStorage.setItem(full,JSON.stringify(v));}catch{}};
  return[val,save];
}

function getDatesInRange(start,end){
  const dates=[];let d=new Date(start);const e=new Date(end);
  while(d<=e){dates.push(d.toISOString().split("T")[0]);d.setDate(d.getDate()+1);}
  return dates;
}
function getWeekDates(offset=0){
  const now=new Date();now.setDate(now.getDate()+offset*7);
  const day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-((day+6)%7));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return getDatesInRange(mon.toISOString().split("T")[0],sun.toISOString().split("T")[0]);
}
function getMonthDates(year,month){
  const start=new Date(year,month,1),end=new Date(year,month+1,0);
  return getDatesInRange(start.toISOString().split("T")[0],end.toISOString().split("T")[0]);
}
function getYearDates(year){return getDatesInRange(`${year}-01-01`,`${year}-12-31`);}

function ProgressRing({pct,size=56,stroke=5,color="#00e5ff"}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  return(
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset .4s"}}/>
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle" fill={color}
        style={{fontSize:size*0.22,fontFamily:"monospace",fontWeight:700}}>{Math.round(pct)}%</text>
    </svg>
  );
}

function Badge({label,color}){
  return <span style={{background:color+"22",color,border:`1px solid ${color}55`,borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,letterSpacing:1}}>{label}</span>;
}

function MiniBar({value,max,color,label,sub}){
  const pct=max>0?Math.min(100,(value/max)*100):0;
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{color:"#94a3b8",fontSize:11}}>{label}</span>
        <span style={{color,fontSize:11,fontWeight:700}}>{sub}</span>
      </div>
      <div style={{height:5,background:"#1e293b",borderRadius:3}}>
        <div style={{height:5,width:`${pct}%`,background:color,borderRadius:3,transition:"width .4s"}}/>
      </div>
    </div>
  );
}

function Overview({habits,habitLog,workoutLog,mealLog,trades,budget}){
  const dk=todayKey();
  const doneHabits=HABITS.filter(h=>habitLog[dk]?.[h.id]).length;
  const habitPct=Math.round((doneHabits/HABITS.length)*100);
  const todayTrades=trades.filter(t=>t.date===dk);
  const wins=todayTrades.filter(t=>t.result==="WIN").length;
  const spent=budget.expenses?.filter(e=>e.date===dk).reduce((s,e)=>s+Number(e.amount),0)||0;
  const dailyBudget=budget.daily||5000;
  const remaining=dailyBudget-spent;
  const workoutDone=workoutLog[dk]?.done;
  const now=new Date();
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return(
    <div style={{padding:"0 0 80px"}}>
      <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e293b 100%)",border:"1px solid #334155",borderRadius:16,padding:20,marginBottom:16}}>
        <div style={{color:"#64748b",fontSize:11,letterSpacing:2,marginBottom:4}}>{days[now.getDay()].toUpperCase()}, {now.toLocaleDateString("en-IN",{day:"numeric",month:"short"}).toUpperCase()}</div>
        <div style={{fontSize:28,fontWeight:900,color:"#f1f5f9",fontFamily:"Georgia,serif",marginBottom:16}}>Overview</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[
            {label:"TODAY'S DISCIPLINE",value:`${doneHabits}/8 habits`,pct:habitPct,color:"#a855f7"},

            {label:"TRADES TODAY",value:`${todayTrades.length} trades · ${wins}W`,pct:todayTrades.length?(wins/todayTrades.length)*100:0,color:"#f59e0b"},
          ].map(card=>(
            <div key={card.label} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:12,padding:14,display:"flex",flexDirection:"column",gap:8}}>
              <div style={{color:"#64748b",fontSize:9,letterSpacing:1.5,fontWeight:700}}>{card.label}</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{color:"#f1f5f9",fontSize:13,fontWeight:700}}>{card.value}</div>
                <ProgressRing pct={card.pct} size={44} stroke={4} color={card.color}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:16,padding:16,marginBottom:16}}>
        <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:12}}>HABITS TODAY</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {HABITS.map(h=>{
            const done=habitLog[dk]?.[h.id];
            return(
              <div key={h.id} style={{textAlign:"center",padding:"10px 4px",background:done?"#a855f722":"#1e293b",border:`1px solid ${done?"#a855f7":"#334155"}`,borderRadius:10,cursor:"pointer",transition:"all .2s"}} onClick={()=>habits(h.id)}>
                <div style={{fontSize:20,marginBottom:4}}>{h.icon}</div>
                <div style={{fontSize:9,color:done?"#a855f7":"#64748b",fontWeight:600}}>{done?"✓":"—"}</div>

function Workout({workoutLog,setWorkoutLog}){
  const dk=todayKey();
  const[phase,setPhase]=useStorage("workout_phase",1);
  const[selDay,setSelDay]=useStorage("workout_day","Day A");
  const phaseData=WORKOUT_PLAN[`phase${phase}`];
  const safeDay=phaseData.schedules[selDay]?selDay:"Day A";
  const exercises=phaseData.schedules[safeDay]||[];
  const log=workoutLog[dk]||{};
  const checked=log.exercises||{};
  const toggle=(name)=>{
    const upd={...workoutLog,[dk]:{...log,exercises:{...checked,[name]:!checked[name]}}};
    const done=exercises.every(e=>upd[dk].exercises[e.name]);
    upd[dk].done=done;
    setWorkoutLog(upd);
  };
  const doneCount=exercises.filter(e=>checked[e.name]).length;
  const pct=exercises.length?Math.round((doneCount/exercises.length)*100):0;
  return(
    <div style={{padding:"0 0 80px"}}>
      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:16,padding:16,marginBottom:12}}>
        <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>SELECT PHASE</div>
        <div style={{display:"flex",gap:8}}>
          {[1,2,3].map(p=>(
            <button key={p} onClick={()=>{setPhase(p);setSelDay("Day A");}}
              style={{flex:1,padding:"10px 4px",borderRadius:10,border:`1px solid ${phase===p?PHASE_COLORS[p]:"#334155"}`,cursor:"pointer",background:phase===p?PHASE_COLORS[p]+"22":"#1e293b",color:phase===p?PHASE_COLORS[p]:"#64748b",fontSize:11,fontWeight:700}}>
              Phase {p}
            </button>
          ))}
        </div>
        <div style={{marginTop:8,color:PHASE_COLORS[phase],fontSize:12,fontWeight:600}}>{phaseData.label} · {phaseData.months} · {phaseData.days} days/week</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {Object.keys(phaseData.schedules).map(d=>(
          <button key={d} onClick={()=>setSelDay(d)} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",background:safeDay===d?"#00e5ff":"#1e293b",color:safeDay===d?"#000":"#64748b",fontSize:11,fontWeight:700}}>{d}</button>
        ))}
      </div>
      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:16,padding:16,marginBottom:12,display:"flex",alignItems:"center",gap:16}}>
        <ProgressRing pct={pct} size={64} stroke={6} color="#00e5ff"/>
        <div>
          <div style={{color:"#f1f5f9",fontSize:18,fontWeight:800}}>{doneCount}/{exercises.length} exercises</div>
          <div style={{color:"#64748b",fontSize:12}}>{safeDay}</div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {exercises.map(ex=>{
          const done=!!checked[ex.name];
          return(
            <div key={ex.name} onClick={()=>toggle(ex.name)} style={{background:done?"#00e5ff11":"#0f172a",border:`1px solid ${done?"#00e5ff":"#334155"}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .2s"}}>
              <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${done?"#00e5ff":"#475569"}`,background:done?"#00e5ff":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#000",fontSize:12,fontWeight:900}}>{done?"✓":""}</div>
              <div style={{flex:1}}>

function HabitsTab({habitLog,setHabitLog}){
  const dk=todayKey();
  const log=habitLog[dk]||{};
  const toggle=(id)=>{const upd={...habitLog,[dk]:{...log,[id]:!log[id]}};setHabitLog(upd);};
  const streak=(id)=>{
    let s=0,d=new Date();
    while(true){const k=d.toISOString().split("T")[0];if(habitLog[k]?.[id]){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  };
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split("T")[0];});
  return(
    <div style={{padding:"0 0 80px"}}>
      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:16,padding:16,marginBottom:12}}>
        <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:4}}>LAST 7 DAYS</div>
        <div style={{display:"flex",gap:4}}>
          {last7.map(d=>{
            const doneCount=HABITS.filter(h=>habitLog[d]?.[h.id]).length;
            const pct=(doneCount/HABITS.length)*100;
            return(
              <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{height:40,width:"100%",background:"#1e293b",borderRadius:4,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",bottom:0,width:"100%",height:`${pct}%`,background:pct===100?"#a855f7":pct>60?"#10b981":"#334155",transition:"height .3s"}}/>
                </div>
                <div style={{color:"#64748b",fontSize:8}}>{new Date(d).toLocaleDateString("en",{weekday:"short"}).slice(0,1)}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {HABITS.map(h=>{
          const done=!!log[h.id];
          const str=streak(h.id);
          return(
            <div key={h.id} onClick={()=>toggle(h.id)} style={{background:done?"#a855f711":"#0f172a",border:`1px solid ${done?"#a855f7":"#334155"}`,borderRadius:14,padding:"14px 16px",cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",gap:14}}>
              <div style={{fontSize:28}}>{h.icon}</div>
              <div style={{flex:1}}>
                <div style={{color:done?"#a855f7":"#f1f5f9",fontSize:14,fontWeight:700}}>{h.label}</div>
                <div style={{color:"#64748b",fontSize:11,marginTop:2}}>{str>0?`🔥 ${str} day streak`:"Start your streak today"}</div>
              </div>
              <div style={{width:32,height:32,borderRadius:"50%",border:`2px solid ${done?"#a855f7":"#475569"}`,background:done?"#a855f7":"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16,fontWeight:900}}>{done?"✓":""}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

}

function Analytics({habitLog,workoutLog,mealLog,trades,budget}){
  const[period,setPeriod]=useState("week");
  const[weekOffset,setWeekOffset]=useState(0);
  const[selMonth,setSelMonth]=useState(new Date().getMonth());
  const[selYear,setSelYear]=useState(new Date().getFullYear());
  const[section,setSection]=useState("habits");
  const now=new Date();
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let dates=[],periodLabel="";
  if(period==="week"){dates=getWeekDates(weekOffset);const d0=new Date(dates[0]),d1=new Date(dates[dates.length-1]);periodLabel=`${d0.toLocaleDateString("en-IN",{day:"numeric",month:"short"})} – ${d1.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}`;}
  else if(period==="month"){dates=getMonthDates(selYear,selMonth);periodLabel=`${MONTHS[selMonth]} ${selYear}`;}
  else{dates=getYearDates(selYear);periodLabel=`Year ${selYear}`;}
  const habitData=HABITS.map(h=>{const done=dates.filter(d=>habitLog[d]?.[h.id]).length;return{...h,done,total:dates.length,pct:Math.round((done/dates.length)*100)};});
  const avgHabitPct=Math.round(habitData.reduce((s,h)=>s+h.pct,0)/HABITS.length);
  const perfectDays=dates.filter(d=>HABITS.every(h=>habitLog[d]?.[h.id])).length;
  const workoutDays=dates.filter(d=>workoutLog[d]?.done).length;
  const workoutPct=Math.round((workoutDays/dates.length)*100);
  const mealDays=dates.filter(d=>{const eaten=mealLog[d]?.meals||{};return Object.values(eaten).some(Boolean);}).length;
  const fullMealDays=dates.filter(d=>{const eaten=mealLog[d]?.meals||{};return Object.values(eaten).filter(Boolean).length>=3;}).length;
  const periodTrades=trades.filter(t=>dates.includes(t.date));
  const wins=periodTrades.filter(t=>t.result==="WIN").length;
  const losses=periodTrades.filter(t=>t.result==="LOSS").length;
  const be=periodTrades.filter(t=>t.result==="BE").length;
  const winRate=periodTrades.length?Math.round((wins/periodTrades.length)*100):0;
  const avgScore=periodTrades.length?(periodTrades.reduce((s,t)=>s+Number(t.score||0),0)/periodTrades.length).toFixed(1):"—";
  const londonTrades=periodTrades.filter(t=>t.session==="London").length;
  const nyTrades=periodTrades.filter(t=>t.session==="New York").length;
  const expenses=budget.expenses||[];
  const periodExpenses=expenses.filter(e=>dates.includes(e.date));
  const totalSpent=periodExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const dailyLimit=budget.daily||5000;
  const budgetDays=[...new Set(periodExpenses.map(e=>e.date))].length;
  const avgDailySpend=budgetDays>0?Math.round(totalSpent/budgetDays):0;
  const overBudgetDays=dates.filter(d=>{const daySpend=expenses.filter(e=>e.date===d).reduce((s,e)=>s+Number(e.amount),0);return daySpend>dailyLimit;}).length;
  const catTotals={};periodExpenses.forEach(e=>{catTotals[e.cat]=(catTotals[e.cat]||0)+Number(e.amount);});
  const catColors={Food:"#f59e0b",Transport:"#00e5ff",Health:"#10b981",Workout:"#a855f7",Trading:"#ef4444",Other:"#64748b"};
  let chartBuckets=[];
  if(period==="week"){chartBuckets=dates.map(d=>({label:new Date(d).toLocaleDateString("en",{weekday:"short"}).slice(0,2),habitPct:Math.round((HABITS.filter(h=>habitLog[d]?.[h.id]).length/HABITS.length)*100),workout:workoutLog[d]?.done?1:0,spent:expenses.filter(e=>e.date===d).reduce((s,e)=>s+Number(e.amount),0),trades:trades.filter(t=>t.date===d).length}));}
  else if(period==="month"){const weeks={};dates.forEach(d=>{const wd=new Date(d);const wn=Math.ceil(wd.getDate()/7);const key=`W${wn}`;if(!weeks[key])weeks[key]={label:key,dates:[]};weeks[key].dates.push(d);});chartBuckets=Object.values(weeks).map(w=>({label:w.label,habitPct:Math.round(w.dates.reduce((s,d)=>s+(HABITS.filter(h=>habitLog[d]?.[h.id]).length/HABITS.length)*100,0)/w.dates.length),workout:w.dates.filter(d=>workoutLog[d]?.done).length,spent:expenses.filter(e=>w.dates.includes(e.date)).reduce((s,e)=>s+Number(e.amount),0),trades:trades.filter(t=>w.dates.includes(t.date)).length}));}
  else{chartBuckets=MONTHS.map((m,i)=>{const mDates=getMonthDates(selYear,i);return{label:m.slice(0,3),habitPct:mDates.length?Math.round(mDates.reduce((s,d)=>s+(HABITS.filter(h=>habitLog[d]?.[h.id]).length/HABITS.length)*100,0)/mDates.length):0,workout:mDates.filter(d=>workoutLog[d]?.done).length,spent:expenses.filter(e=>mDates.includes(e.date)).reduce((s,e)=>s+Number(e.amount),0),trades:trades.filter(t=>mDates.includes(t.date)).length};});}
  const sections=["habits","workout","meals","trading","budget"];
  const secIcons={habits:"🔥",workout:"💪",meals:"🍱",trading:"₿",budget:"₹"};
  const s={background:"#0f172a",border:"1px solid #334155",borderRadius:14,padding:14,marginBottom:12};
  const heatDates=Array.from({length:90},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(89-i));return d.toISOString().split("T")[0];});
  const nav=(dir)=>{if(period==="week")setWeekOffset(w=>w+dir);else if(period==="month"){setSelMonth(m=>{if(dir>0&&m===11){setSelYear(y=>y+1);return 0;}if(dir<0&&m===0){setSelYear(y=>y-1);return 11;}return m+dir;});}else setSelYear(y=>y+dir);};
  return(
    <div style={{padding:"0 0 80px"}}>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {["week","month","year"].map(p=>(
          <button key={p} onClick={()=>setPeriod(p)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:period===p?"#a855f7":"#1e293b",color:period===p?"#fff":"#64748b"}}>
            {p.charAt(0).toUpperCase()+p.slice(1)}
          </button>
        ))}
      </div>
      <div style={{...s,display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>nav(-1)} style={{background:"#1e293b",border:"none",color:"#a855f7",fontSize:18,cursor:"pointer",padding:"4px 10px",borderRadius:8}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{color:"#f1f5f9",fontSize:13,fontWeight:700}}>{periodLabel}</div>
          <div style={{color:"#64748b",fontSize:10}}>{dates.length} days</div>
        </div>
        <button onClick={()=>nav(1)} style={{background:"#1e293b",border:"none",color:"#a855f7",fontSize:18,cursor:"pointer",padding:"4px 10px",borderRadius:8}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[{l:"DISCIPLINE",v:`${avgHabitPct}%`,c:"#a855f7"},{l:"WORKOUTS",v:workoutDays,c:"#00e5ff"},{l:"WIN RATE",v:winRate+"%",c:"#10b981"},{l:"PERFECT DAYS",v:perfectDays,c:"#f59e0b"},{l:"TRADES",v:periodTrades.length,c:"#f59e0b"},{l:"SPENT",v:`₹${(totalSpent/1000).toFixed(1)}k`,c:"#ef4444"}].map(c=>(
          <div key={c.l} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{color:"#64748b",fontSize:8,letterSpacing:1}}>{c.l}</div>
            <div style={{color:c.c,fontSize:18,fontWeight:900}}>{c.v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {sections.map(sec=>(
          <button key={sec} onClick={()=>setSection(sec)} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:section===sec?"#a855f7":"#1e293b",color:section===sec?"#fff":"#64748b"}}>
            {secIcons[sec]} {sec.charAt(0).toUpperCase()+sec.slice(1)}
          </button>
        ))}
      </div>
      {section==="habits"&&(
        <>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>90-DAY DISCIPLINE HEATMAP</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
              {heatDates.map(d=>{const cnt=HABITS.filter(h=>habitLog[d]?.[h.id]).length;const pct=cnt/HABITS.length;const bg=pct===0?"#1e293b":pct<0.4?"#581c87":pct<0.7?"#7c3aed":pct<1?"#a855f7":"#c084fc";return <div key={d} title={`${d}: ${cnt}/8`} style={{width:8,height:8,borderRadius:1.5,background:bg}}/>;})}
            </div>
            <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
              <span style={{color:"#64748b",fontSize:9}}>Less</span>
              {["#1e293b","#581c87","#7c3aed","#a855f7","#c084fc"].map(c=><div key={c} style={{width:8,height:8,borderRadius:1.5,background:c}}/>)}
              <span style={{color:"#64748b",fontSize:9}}>More</span>
            </div>
          </div>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>HABIT COMPLETION RATE</div>
            {habitData.map(h=>(
              <MiniBar key={h.id} label={`${h.icon} ${h.label}`} value={h.done} max={dates.length} color={h.pct>=80?"#a855f7":h.pct>=50?"#f59e0b":"#ef4444"} sub={`${h.done}/${dates.length} days (${h.pct}%)`}/>
            ))}
          </div>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>DISCIPLINE TREND</div>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:70}}>
              {chartBuckets.map((b,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{width:"100%",height:60,position:"relative",background:"#1e293b",borderRadius:3}}>
                    <div style={{position:"absolute",bottom:0,width:"100%",height:`${b.habitPct}%`,background:b.habitPct>=80?"#a855f7":b.habitPct>=50?"#f59e0b":"#ef4444",borderRadius:3,transition:"height .4s"}}/>
                  </div>
                  <div style={{color:"#64748b",fontSize:8}}>{b.label}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
      {section==="workout"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[{l:"Sessions Done",v:workoutDays,c:"#00e5ff",sub:`of ${dates.length} days`},{l:"Completion Rate",v:workoutPct+"%",c:"#10b981",sub:"of this period"}].map(c=>(
              <div key={c.l} style={{...s,textAlign:"center",marginBottom:0}}>
                <div style={{color:"#64748b",fontSize:10}}>{c.l}</div>
                <div style={{color:c.c,fontSize:28,fontWeight:900}}>{c.v}</div>
                <div style={{color:"#64748b",fontSize:10}}>{c.sub}</div>
              </div>
            ))}
          </div>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>WORKOUT CALENDAR</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {dates.map(d=>{const done=workoutLog[d]?.done;return(
                <div key={d} style={{width:period==="week"?36:period==="month"?20:8,height:period==="week"?36:period==="month"?20:8,borderRadius:period==="week"?8:4,background:done?"#00e5ff":"#1e293b",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {period==="week"&&<span style={{fontSize:8,color:done?"#000":"#475569"}}>{new Date(d).getDate()}</span>}
                  {period==="month"&&<span style={{fontSize:7,color:done?"#000":"#475569"}}>{new Date(d).getDate()}</span>}
                </div>
              );})}
            </div>
          </div>
        </>
      )}
      {section==="meals"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[{l:"Days Tracked",v:mealDays,c:"#f59e0b",sub:`of ${dates.length} days`},{l:"Full Meal Days",v:fullMealDays,c:"#10b981",sub:"3+ meals logged"}].map(c=>(
              <div key={c.l} style={{...s,textAlign:"center",marginBottom:0}}>
                <div style={{color:"#64748b",fontSize:10}}>{c.l}</div>
                <div style={{color:c.c,fontSize:28,fontWeight:900}}>{c.v}</div>
                <div style={{color:"#64748b",fontSize:10}}>{c.sub}</div>
              </div>
            ))}
          </div>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:6}}>MEAL COMPLIANCE</div>
            <MiniBar label="Days with any meal logged" value={mealDays} max={dates.length} color="#f59e0b" sub={`${Math.round((mealDays/dates.length)*100)}%`}/>
            <MiniBar label="Full meal days (3+ meals)" value={fullMealDays} max={dates.length} color="#10b981" sub={`${Math.round((fullMealDays/dates.length)*100)}%`}/>
          </div>
        </>
      )}
      {section==="trading"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
            {[{l:"TOTAL",v:periodTrades.length,c:"#f59e0b"},{l:"WINS",v:wins,c:"#10b981"},{l:"LOSSES",v:losses,c:"#ef4444"},{l:"BE",v:be,c:"#64748b"},{l:"WIN RATE",v:winRate+"%",c:"#00e5ff"},{l:"AVG SCORE",v:avgScore+"/5",c:"#a855f7"}].map(c=>(
              <div key={c.l} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <div style={{color:"#64748b",fontSize:8,letterSpacing:1}}>{c.l}</div>
                <div style={{color:c.c,fontSize:18,fontWeight:900}}>{c.v}</div>
              </div>
            ))}
          </div>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>SESSION BREAKDOWN</div>
            <MiniBar label="London Open" value={londonTrades} max={periodTrades.length||1} color="#00e5ff" sub={`${londonTrades} trades`}/>
            <MiniBar label="New York Open" value={nyTrades} max={periodTrades.length||1} color="#f59e0b" sub={`${nyTrades} trades`}/>
            <MiniBar label="Win Rate" value={wins} max={periodTrades.length||1} color="#10b981" sub={`${winRate}%`}/>
          </div>
        </>
      )}
      {section==="budget"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[{l:"Total Spent",v:`₹${totalSpent.toLocaleString()}`,c:"#ef4444"},{l:"Avg/Day",v:`₹${avgDailySpend.toLocaleString()}`,c:"#f59e0b"},{l:"Days Over Budget",v:overBudgetDays,c:"#ef4444"},{l:"vs Budget",v:dailyLimit*dates.length>=totalSpent?"✓ Under":"✗ Over",c:dailyLimit*dates.length>=totalSpent?"#10b981":"#ef4444"}].map(c=>(
              <div key={c.l} style={{...s,textAlign:"center",marginBottom:0}}>
                <div style={{color:"#64748b",fontSize:10}}>{c.l}</div>
                <div style={{color:c.c,fontSize:c.v.length>8?16:22,fontWeight:900}}>{c.v}</div>
              </div>
            ))}
          </div>
          <div style={s}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>SPENDING BY CATEGORY</div>
            {Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(
              <MiniBar key={cat} label={cat} value={amt} max={totalSpent||1} color={catColors[cat]||"#64748b"} sub={`₹${amt.toLocaleString()} (${Math.round((amt/totalSpent)*100)}%)`}/>
            ))}
            {Object.keys(catTotals).length===0&&<div style={{color:"#475569",fontSize:12}}>No expenses logged for this period.</div>}
          </div>
        </>
      )}
    </div>
  );
}

function App(){
  const[activeTab,setActiveTab]=useState("Overview");
  const[habitLog,setHabitLog]=useStorage("habitLog",{});
  const[workoutLog,setWorkoutLog]=useStorage("workoutLog",{});
  const[mealLog,setMealLog]=useStorage("mealLog",{});
  const[trades,setTrades]=useStorage("trades",[]);
  const[budget,setBudget]=useStorage("budget",{daily:5000,expenses:[]});
  const toggleHabit=(id)=>{const dk=todayKey();const log=habitLog[dk]||{};setHabitLog({...habitLog,[dk]:{...log,[id]:!log[id]}});};
  const tabIcons={Overview:"⚡",Workout:"💪",Meals:"🍱",Trading:"₿",Habits:"🔥",Budget:"₹",Analytics:"📊"};
  return(
    <div style={{minHeight:"100vh",background:"#020817",color:"#f1f5f9",fontFamily:"'DM Sans',system-ui,-apple-system,sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:"#020817cc",backdropFilter:"blur(12px)",padding:"14px 20px 8px",borderBottom:"1px solid #1e293b"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:3}}>DAILY TRACKER</div>
            <div style={{color:"#f1f5f9",fontSize:16,fontWeight:800}}>{new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
          </div>
          <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#a855f7,#00e5ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        {activeTab==="Overview"&&<Overview habits={toggleHabit} habitLog={habitLog} workoutLog={workoutLog} mealLog={mealLog} trades={trades} budget={budget}/>}
        {activeTab==="Workout"&&<Workout workoutLog={workoutLog} setWorkoutLog={setWorkoutLog}/>}
        {activeTab==="Meals"&&<Meals mealLog={mealLog} setMealLog={setMealLog}/>}
        {activeTab==="Trading"&&<Trading trades={trades} setTrades={setTrades}/>}
        {activeTab==="Habits"&&<HabitsTab habitLog={habitLog} setHabitLog={setHabitLog}/>}
        {activeTab==="Budget"&&<Budget budget={budget} setBudget={setBudget}/>}
        {activeTab==="Analytics"&&<Analytics habitLog={habitLog} workoutLog={workoutLog} mealLog={mealLog} trades={trades} budget={budget}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0f172acc",backdropFilter:"blur(16px)",borderTop:"1px solid #1e293b",display:"flex",zIndex:200}}>
        {TABS.map(tab=>{
          const active=activeTab===tab;
          return(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{flex:1,padding:"8px 2px 10px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:15}}>{tabIcons[tab]}</span>
              <span style={{fontSize:7,fontWeight:700,color:active?"#a855f7":"#475569"}}>{tab.slice(0,3).toUpperCase()}</span>
              {active&&<div style={{width:16,height:2,background:"#a855f7",borderRadius:1}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
